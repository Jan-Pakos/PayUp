spring:
  application:
    name: userservice
  datasource:
    url: jdbc:postgresql://localhost:5432/payup_users
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

app:
  jwt:
    secret: ${JWT_SECRET:changeme-use-a-long-random-256-bit-secret-in-production}
    expiration-ms: 86400000
  frontend-redirect-url: ${FRONTEND_URL:http://localhost:3000}
